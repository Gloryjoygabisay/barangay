<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Trail Through the Barangay</title>
    <meta
      name="description"
      content="A mobile-friendly narrative exploration game set in a mountain village."
    />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div id="app">
      <section id="start-screen" class="start-screen">
        <div class="start-card">
          <div class="start-copy">
            <p class="eyebrow" id="start-eyebrow"></p>
            <h1 id="start-title"></h1>
            <p id="start-blurb" class="start-blurb"></p>
            <div class="start-features">
              <h2 id="start-features-heading"></h2>
              <ul>
                <li id="start-feature-village"></li>
                <li id="start-feature-choices"></li>
                <li id="start-feature-language"></li>
              </ul>
            </div>
          </div>
          <div class="start-actions">
            <label class="language-picker language-picker-large">
              <span id="start-language-label"></span>
              <select id="start-language-select" aria-label="Choose language before starting">
                <option value="en">English</option>
                <option value="tl">Filipino</option>
              </select>
            </label>
            <button id="start-about-button" class="secondary-button compact-button" type="button"></button>
            <button id="start-button" class="primary-button"></button>
            <p id="start-hint" class="start-hint"></p>
            <p class="version-line"><span id="start-version-label"></span> <strong id="start-version-value"></strong></p>
          </div>
        </div>
      </section>
      <div id="game-shell" class="game-shell hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="title-eyebrow"></p>
            <h1 id="title-text"></h1>
            <p class="version-line inline-version"><span id="version-label"></span> <strong id="version-value"></strong></p>
          </div>
          <div class="topbar-actions">
            <label class="language-picker">
              <span id="language-label"></span>
              <select id="language-select" aria-label="Choose language">
                <option value="en">English</option>
                <option value="tl">Filipino</option>
              </select>
            </label>
            <button id="about-button" class="secondary-button compact-button" type="button"></button>
          </div>
        </header>
        <div id="game-root"></div>
        <aside class="panel">
          <section class="stats-card">
            <h2 id="stats-heading"></h2>
            <div class="stats-grid">
              <div>
                <span id="trust-label"></span>
                <strong id="trust-value"></strong>
              </div>
              <div>
                <span id="courage-label"></span>
                <strong id="courage-value"></strong>
              </div>
              <div>
                <span id="supplies-label"></span>
                <strong id="supplies-value"></strong>
              </div>
            </div>
          </section>
          <section class="instructions-card">
            <h2 id="instructions-heading"></h2>
            <p id="instructions-body"></p>
          </section>
        </aside>
        <section id="dialogue-panel" class="dialogue hidden" aria-live="polite">
          <div class="dialogue-card">
            <p class="dialogue-location" id="dialogue-location"></p>
            <h2 id="dialogue-title"></h2>
            <p id="dialogue-body"></p>
            <div id="choice-list" class="choice-list"></div>
            <button id="close-dialogue" class="secondary-button"></button>
          </div>
        </section>
      </div>
      <section id="about-panel" class="about-panel hidden" aria-live="polite">
        <div class="about-card">
          <p class="dialogue-location" id="about-kicker"></p>
          <h2 id="about-title"></h2>
          <p id="about-body"></p>
          <p class="version-line"><span id="about-version-label"></span> <strong id="about-version-value"></strong></p>
          <button id="close-about" class="secondary-button" type="button"></button>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
